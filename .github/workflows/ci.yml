name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-validate:
    name: Backend Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend dependencies
        working-directory: server
        run: npm install
      - name: Validate backend files
        working-directory: server
        run: npm run validate

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: backend-validate
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend dependencies
        working-directory: client
        run: npm install
      - name: Build frontend
        working-directory: client
        run: npm run build
